<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URBAN CASA | Online</title>
    </head>
<body>
    <script>
    const FIREBASE_URL = "https://furniture-catalogue-5beec-default-rtdb.firebaseio.com/catalogue.json";
    let data = [];

    // Load data from Firebase
    async function loadData() {
        try {
            const response = await fetch(FIREBASE_URL);
            const result = await response.json();
            data = result || [];
            render();
        } catch (e) {
            console.error("Error loading data:", e);
        }
    }

    // Save data to Firebase
    async function saveToFirebase() {
        try {
            await fetch(FIREBASE_URL, {
                method: 'PUT',
                body: JSON.stringify(data),
                headers: {'Content-Type': 'application/json'}
            });
            alert("Catalogue saved to the cloud!");
        } catch (e) {
            console.error("Error saving data:", e);
        }
    }

    // Updated Save and Close
    function saveAndClose() {
        saveToFirebase();
        toggleModal(false);
    }

    // Initial Load
    loadData();

    // ... keep your existing render(), updateImage(), and exportPDF() functions ...
</script>
</body>
</html>
