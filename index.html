<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URBAN CASA - ADMIN</title>
    <style>
        :root { --primary: #1a1a2e; }
        body { margin: 0; background: #f4f4f4; color: #333; font-family: sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .edit-row { background: #fff; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        input { width: 100%; padding: 8px; margin: 5px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-delete { background: #ff4757; color: white; border: none; padding: 10px; border-radius: 5px; width: 100%; cursor: pointer; }
        .btn-add { background: #1a1a2e; color: white; padding: 10px; border-radius: 5px; cursor: pointer; border: none; }
        .btn-save { background: #2ed573; color: white; padding: 15px; width: 100%; margin-top: 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Admin Panel</h1>
    <button id="addBtn" class="btn-add">+ Add Product</button>
    <div id="editorInputs" style="margin-top:20px;"></div>
    <button onclick="saveData()" class="btn-save">Save Changes to Cloud</button>

    <script>
        const DATA_URL = "https://furniture-catalogue-5beec-default-rtdb.firebaseio.com/catalogue.json";
        let data = [];

        async function fetchData() {
            const res = await fetch(DATA_URL);
            data = await res.json() || [];
            render();
        }

        function render() {
            document.getElementById('editorInputs').innerHTML = data.map((item, i) => `
                <div class="edit-row">
                    <input type="text" value="${item.name || ''}" onchange="data[${i}].name=this.value" placeholder="Name">
                    <input type="text" value="${item.link || ''}" onchange="data[${i}].link=this.value" placeholder="Google Drive Link">
                    <input type="file" onchange="handleImage(event, ${i})">
                    <button class="btn-delete" onclick="data.splice(${i},1); render();">Delete</button>
                </div>
            `).join('');
        }

        function handleImage(e, i) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const canvas = document.createElement('canvas');
                canvas.width = 400; canvas.height = 300;
                canvas.getContext('2d').drawImage(ev.target.result, 0, 0, 400, 300);
                // Note: The image object needs to be loaded into the image element correctly
                const img = new Image();
                img.onload = () => {
                    canvas.getContext('2d').drawImage(img, 0, 0, 400, 300);
                    data[i].img = canvas.toDataURL('image/jpeg', 0.6);
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function saveData() {
            await fetch(DATA_URL, { 
                method: 'PUT', 
                body: JSON.stringify(data), 
                headers: {'Content-Type': 'application/json'} 
            });
            alert("Changes saved to cloud!");
        }

        document.getElementById('addBtn').onclick = () => { 
            data.unshift({name: "New Product", img: "", link: "#"}); 
            render(); 
        };
        
        fetchData();
    </script>
</body>
</html>
