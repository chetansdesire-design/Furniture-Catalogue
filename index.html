<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>URBAN CASA - ADMIN</title>
    <style>
        :root { --primary: #1a1a2e; --glass: rgba(255, 255, 255, 0.1); }
        body { margin: 0; background: var(--primary); color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto; padding-bottom: 60px; }
        header { padding: 30px 20px; text-align: center; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; padding: 12px; max-width: 800px; margin: auto; }
        .tile { background: var(--glass); border-radius: 16px; overflow: hidden; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .tile img { width: 100%; height: 140px; object-fit: cover; display: block; }
        .tile p { padding: 10px; font-size: 14px; margin: 0; }
        
        .floating-btns { position: fixed; top: 20px; right: 20px; z-index: 1000; display: flex; gap: 10px; }
        .action-btn { background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); padding: 12px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; font-weight: bold; }
        
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f9f9f9; z-index: 2000; padding: 20px; overflow-y: auto; color: #333; box-sizing: border-box; }
        .modal-content { max-width: 600px; margin: auto; padding-bottom: 40px; }
        .edit-row { background: #fff; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #eee; }
        input[type="text"], input[type="password"] { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
        input[type="file"] { margin: 10px 0; width: 100%; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; min-width: 120px;}
        .btn-delete { background: #ff4757; }
        
        #pinOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; }
    </style>
</head>
<body>

<div id="pinOverlay">
    <h2>Admin Login</h2>
    <input type="password" id="pinInput" placeholder="Enter PIN" style="text-align: center; font-size: 24px; width: 200px; margin-bottom: 15px;">
    <button onclick="checkPin()" style="padding: 15px 40px; background: #2ed573; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px;">Unlock</button>
    <p id="pinError" style="color: #ff4757; display: none; margin-top: 15px; font-weight: bold;">Incorrect PIN</p>
</div>

<header><h1>URBAN CASA (Admin)</h1></header>

<div class="floating-btns">
    <div class="action-btn" onclick="shareCatalog()" style="background: #25D366; color: white; border-color: #25D366;">📲 Share Link</div>
    <div class="action-btn" onclick="toggleModal(true)">⚙️ Settings</div>
</div>

<div class="grid" id="tileGrid"></div>

<div id="modal">
    <div class="modal-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin: 0;">Catalogue Settings</h2>
            <button onclick="toggleModal(false)" style="padding: 10px; background: none; border: none; font-size: 20px; cursor: pointer;">❌</button>
        </div>
        
        <div style="background: #eef2f5; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #dcdde1;">
            <h3 style="margin-top:0; color: #1a1a2e; font-size: 18px;">🌍 Global App Settings</h3>
            <p style="font-size: 12px; color: #666; margin-top: 0;">This number will be used when customers tap "Chat on WhatsApp".</p>
            
            <label style="font-size: 12px; color: #555; font-weight: bold; text-transform: uppercase;">Customer Care Number (Country Code + Number)</label>
            <input type="text" id="waNumberInput" placeholder="e.g., 919876543210" onchange="appSettings.whatsapp = this.value">
        </div>

        <button id="addBtn" style="width:100%; padding:15px; background:#1a1a2e; color:#fff; border:none; border-radius:10px; font-size:16px; font-weight:bold; cursor:pointer;">+ Add New Product Folder</button>
        
        <div id="editorInputs" style="margin-top:20px;"></div>
        
        <button onclick="saveAndClose()" style="width:100%; padding:15px; background:#2ed573; color:#fff; border:none; border-radius:10px; font-size:16px; font-weight:bold; margin-top:20px; cursor:pointer;">Save Changes to Cloud</button>
    </div>
</div>

<script>
    const ADMIN_PIN = "1234"; // Do not forget to change this!
    
    const DATA_URL = "https://furniture-catalogue-5beec-default-rtdb.firebaseio.com/catalogue.json";
    const SETTINGS_URL = "https://furniture-catalogue-5beec-default-rtdb.firebaseio.com/settings.json";
    
    let data = [];
    let appSettings = { whatsapp: "" };

    function checkPin() {
        const input = document.getElementById('pinInput').value;
        if(input === ADMIN_PIN) {
            document.getElementById('pinOverlay').style.display = 'none'; 
            fetchData(); 
        } else {
            document.getElementById('pinError').style.display = 'block'; 
            document.getElementById('pinInput').value = ''; 
        }
    }

    async function fetchData() {
        const [dataRes, settingsRes] = await Promise.all([fetch(DATA_URL), fetch(SETTINGS_URL)]);
        
        const json = await dataRes.json();
        const settingsJson = await settingsRes.json();
        
        data = Array.isArray(json) ? json : [];
        if (settingsJson) appSettings = settingsJson;
        
        document.getElementById('waNumberInput').value = appSettings.whatsapp || "";
        
        render();
    }

    // --- UPDATED AUTO SHARE FUNCTION ---
    function shareCatalog() {
        const shortLink = "https://sl1nk.com/s7y2fj2";
        
        // Professional pre-written message
        const text = encodeURIComponent(`Hello! 🌟 Welcome to Urban Casa.\n\nWe have curated a selection of premium furniture pieces that match your style. You can explore our interactive, mobile-friendly collection here:\n\n👉 ${shortLink}\n\nSimply tap the 'Chat on WhatsApp' button under any product you like, and I will assist you immediately.`);
        
        window.open(`https://wa.me/?text=${text}`, '_blank');
    }

    function render() {
        document.getElementById('tileGrid').innerHTML = data.map(item => `
            <a href="${item.link}" target="_blank" style="text-decoration: none; color: inherit;">
                <div class="tile">
                    <img src="${item.img}" onerror="this.src='https://via.placeholder.com/300?text=No+Cover+Image'">
                    <p>${item.name}</p>
                </div>
            </a>
        `).join('');

        document.getElementById('editorInputs').innerHTML = data.map((item, i) => `
            <div class="edit-row">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <strong style="font-size: 18px; color:#333;">📁 Product Folder ${i + 1}</strong>
                </div>
                
                <label style="font-size: 12px; color: #888; font-weight: bold; text-transform: uppercase;">Folder / Product Name</label>
                <input type="text" value="${item.name}" placeholder="e.g., Luxury Sofa Set" onchange="data[${i}].name=this.value">
                
                <label style="font-size: 12px; color: #888; font-weight: bold; text-transform: uppercase; margin-top: 10px; display: block;">🔗 Google Drive Link</label>
                <input type="text" value="${item.link}" placeholder="Paste Google Drive Link here..." onchange="data[${i}].link=this.value">
                
                <label style="font-size: 12px; color: #888; font-weight: bold; text-transform: uppercase; margin-top: 10px; display: block;">🖼️ Cover Image</label>
                <input type="file" accept="image/*" onchange="handleImageUpload(event, ${i})">
                
                <img src="${item.img}" class="img-preview" style="display: ${item.img ? 'block' : 'none'}; width: 100px; height: 100px; object-fit: cover; border-radius: 8px; margin-top: 10px; border: 1px solid #ddd;">
                
                <div class="btn-group" style="margin-top: 15px;">
                    <button class="btn btn-delete" onclick="deleteProduct(${i})">🗑 Delete</button>
                </div>
            </div>
        `).join('');
    }

    function handleImageUpload(event, index) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (e) => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 600;
                const scaleSize = MAX_WIDTH / img.width;
                canvas.width = MAX_WIDTH;
                canvas.height = img.height * scaleSize;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                data[index].img = canvas.toDataURL('image/jpeg', 0.7);
                render();
            }
        };
    }

    document.getElementById('addBtn').onclick = () => {
        data.unshift({name: "New Folder", img: "", link: "#"}); 
        render();
    };

    function deleteProduct(i) { 
        if(confirm("Are you sure you want to delete this folder?")) {
            data.splice(i, 1); 
            render(); 
        }
    }
    
    function toggleModal(s) { document.getElementById('modal').style.display = s ? 'block' : 'none'; }

    async function saveAndClose() {
        const btn = event.target;
        btn.innerText = "Saving...";
        
        await Promise.all([
            fetch(DATA_URL, { method: 'PUT', body: JSON.stringify(data), headers: {'Content-Type': 'application/json'} }),
            fetch(SETTINGS_URL, { method: 'PUT', body: JSON.stringify(appSettings), headers: {'Content-Type': 'application/json'} })
        ]);
        
        btn.innerText = "Save Changes to Cloud";
        toggleModal(false);
        alert("Synced to Cloud successfully!");
    }
</script>
</body>
</html>
