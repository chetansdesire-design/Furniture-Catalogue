<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>URBAN CASA | Catalogue</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root { --glass: rgba(255, 255, 255, 0.1); --glass-border: rgba(255, 255, 255, 0.2); --text: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #1a1a2e, #16213e); min-height: 100vh; color: var(--text); padding-bottom: 50px; }
        header { padding: 40px 20px 20px; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .tile { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 20px; overflow: hidden; text-decoration: none; color: white; transition: transform 0.3s ease; }
        .tile img { width: 100%; height: 120px; object-fit: cover; }
        .tile p { padding: 10px; text-align: center; font-size: 13px; font-weight: 500; }
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; padding: 20px; overflow-y: auto; color: #333; }
        .modal-content { background: white; padding: 20px; border-radius: 20px; }
        .edit-row { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; }
        .floating-btns { position: fixed; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 101; }
        .action-btn { background: var(--glass); border: 1px solid var(--glass-border); padding: 10px; border-radius: 50%; cursor: pointer; backdrop-filter: blur(10px); width: 40px; height: 40px; color: white; text-align: center; }
    </style>
</head>
<body>

<header>
    <h1>URBAN CASA</h1>
    <p>Timeless furniture for modern living</p>
</header>

<div class="floating-btns">
    <div class="action-btn" onclick="exportPDF()">PDF</div>
    <div class="action-btn" onclick="toggleModal(true)">⚙️</div>
</div>

<div class="grid" id="tileGrid"></div>

<div id="modal">
    <div class="modal-content">
        <h2>Catalogue Manager</h2>
        <div style="margin: 20px 0; padding: 15px; background: #eee; text-align: center; border-radius: 10px; font-weight: bold; cursor: pointer;" onclick="addProduct()">+ Add New Product</div>
        <div id="editorInputs"></div>
        <button onclick="saveAndClose()" style="width:100%; padding:15px; background:#1a1a2e; color:white; border:none; border-radius:10px;">Save Changes</button>
    </div>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('urbanCasaData')) || [
        {name: "Kitchen", img: "https://images.unsplash.com/photo-1556911220-e3742918809a?w=400", link: "#"},
        {name: "Wardrobe", img: "https://images.unsplash.com/photo-1595428774223-ef52624120f0?w=400", link: "#"}
    ];

    function render() {
        const grid = document.getElementById('tileGrid');
        grid.innerHTML = data.map(item => `
            <a href="${item.link}" class="tile" target="_blank">
                <img src="${item.img}" crossorigin="anonymous">
                <p>${item.name}</p>
            </a>
        `).join('');

        const editor = document.getElementById('editorInputs');
        editor.innerHTML = data.map((item, i) => `
            <div class="edit-row">
                <input type="text" value="${item.name}" placeholder="Name" onchange="updateImage(${i}, this.value)">
                <input type="text" value="${item.link}" placeholder="Link" oninput="data[${i}].link=this.value">
                <button onclick="data.splice(${i},1); render()" style="color:red; background:none; border:none;">Delete</button>
            </div>
        `).join('');
    }

    // Auto-fetch image from Unsplash based on search term
    function updateImage(i, query) {
        data[i].name = query;
        // Using Unsplash Source API for dynamic image retrieval
        data[i].img = `https://source.unsplash.com/400x300/?${encodeURIComponent(query)}`;
        render();
    }

    async function exportPDF() {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('p', 'mm', 'a4');
        pdf.setFillColor(26, 26, 46); pdf.rect(0, 0, 210, 30, 'F');
        pdf.setTextColor(255, 255, 255); pdf.setFontSize(22);
        pdf.text("URBAN CASA", 105, 15, { align: 'center' });
        
        const grid = document.getElementById('tileGrid');
        document.querySelector('.floating-btns').style.display = 'none';
        const canvas = await html2canvas(grid, { scale: 2, useCORS: true });
        const imgData = canvas.toDataURL('image/png');
        pdf.addImage(imgData, 'PNG', 15, 40, 180, (canvas.height * 180) / canvas.width);
        pdf.save("UrbanCasa_Catalogue.pdf");
        document.querySelector('.floating-btns').style.display = 'flex';
    }

    function addProduct() { data.push({name: "New Item", img: "", link: "#"}); render(); }
    function toggleModal(show) { document.getElementById('modal').style.display = show ? 'block' : 'none'; }
    function saveAndClose() { localStorage.setItem('urbanCasaData', JSON.stringify(data)); toggleModal(false); render(); }
    render();
</script>
</body>
</html>
